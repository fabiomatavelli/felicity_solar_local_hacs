name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install ruff
      - run: ruff check .

  pytest:
    # Deliberately not "Pytest (Python ${{ matrix.python-version }})" - GitHub's required
    # status checks only match exact context names, no wildcards, so a version-specific
    # name means every future Python bump also requires a branch-protection update or
    # merging silently stops working. A single fixed name plus a single matrix entry
    # keeps that check permanently valid; if a second Python version is ever added here,
    # switch to a matching required-check-per-job scheme instead.
    name: Pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep this in sync with Home Assistant core's own requires-python (currently
        # >=3.14.2, as of the 2026.7.2 stable release) - older interpreters aren't a
        # real target since HA itself won't run this integration on them.
        python-version: ["3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements-test.txt
      - run: pytest
