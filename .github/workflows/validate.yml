name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # The icon ships directly in custom_components/felicity_solar_local/brand/
          # (supported since HA 2026.3.0) instead of the legacy home-assistant/brands
          # repo submission - skip this check since it only knows about the old path.
          ignore: brands
