name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # No logo/icon submitted to home-assistant/brands yet - that's a separate PR
          # to an external repo, tracked as follow-up work rather than blocking CI here.
          ignore: brands
